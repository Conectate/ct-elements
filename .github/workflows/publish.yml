# Publica a npm con Trusted Publisher (OIDC). No uses NPM_TOKEN para el publish.
# El nombre de este archivo debe coincidir exactamente con el configurado en npm → Trusted Publisher.
name: Publish Package

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Ensure npm CLI supports trusted publishing
        run: npm install -g npm@^11.5.1

      - run: pnpm install --frozen-lockfile

      - run: pnpm run prepare-dist

      - name: Publish to npm
        working-directory: dist
        run: npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
